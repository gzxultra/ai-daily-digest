<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- Primary Meta Tags -->
    <title>AI Daily Digest — Curated AI News & Intelligence Brief</title>
    <meta name="description" content="Stay ahead with AI Daily Digest — your daily curated briefing of the most important AI news, research breakthroughs, model releases, and developer tools from top sources." />
    <meta name="keywords" content="AI news, artificial intelligence, machine learning, daily digest, AI research, LLM, GPT, deep learning, AI tools" />
    <meta name="author" content="AI Daily Digest" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://gzxultra.github.io/ai-daily-digest/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gzxultra.github.io/ai-daily-digest/" />
    <meta property="og:title" content="AI Daily Digest — Curated AI News & Intelligence Brief" />
    <meta property="og:description" content="Your daily curated briefing of the most important AI news, research breakthroughs, model releases, and developer tools." />
    <meta property="og:site_name" content="AI Daily Digest" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_CN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Daily Digest — Curated AI News & Intelligence Brief" />
    <meta name="twitter:description" content="Your daily curated briefing of the most important AI news, research breakthroughs, model releases, and developer tools." />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f7f4" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="light dark" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="favicon-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="shortcut icon" href="favicon.ico" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Structured Data -->
    <script type="application/ld+json">
